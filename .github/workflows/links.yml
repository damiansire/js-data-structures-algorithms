name: Links

on:
  push:
    branches: ['**']
    paths:
      - '**.md'
      - '.github/workflows/links.yml'
      - '.lycheeignore'
  pull_request:
    paths:
      - '**.md'
      - '.github/workflows/links.yml'
      - '.lycheeignore'
  workflow_dispatch:

jobs:
  link-checker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check README and doc links
        uses: lycheeverse/lychee-action@v2
        with:
          # Fail the run if any link/badge is broken. Loopback (localhost) and
          # mail links are excluded to avoid false positives from local-dev docs.
          args: >-
            --no-progress
            --exclude-loopback
            --exclude-mail
            ./README.md
            ./visualizador/README.md
          fail: true
        env:
          # Authenticated requests avoid GitHub API rate limiting on badge/repo links.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
